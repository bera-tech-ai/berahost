kind = "slides"
previewPath = "/berahost-deck/"
title = "BERAHOST Deck"
version = "1.0.0"
id = "artifacts/berahost-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/berahost-deck/" ]
localPort = 24990

[services.development]
run = "pnpm --filter @workspace/berahost-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/berahost-deck", "run", "build" ]
publicDir = "artifacts/berahost-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24990"
BASE_PATH = "/berahost-deck/"
