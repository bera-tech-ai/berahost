[phases.setup]
nixPkgs = ["nodejs_22", "nodePackages.pnpm"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "PORT=3000 BASE_PATH=/ NODE_ENV=production pnpm --filter @workspace/berahost run build",
  "NODE_ENV=production pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs"
